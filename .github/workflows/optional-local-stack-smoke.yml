name: Optional Local Stack Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run local startup smoke
        shell: pwsh
        run: ./test_bundle/scripts/run_local_startup_smoke.ps1
